<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Admission Form</title>
</head>
<body>
     <h1>Student Admission Form</h1>
     <p>Please fill the form carefully. All required fields must be completed.</p>
     <form>
        <label for="fullname">Fullname:</label>
        <input type="text"
        id="fullname"
        name="fullname"
        placeholder="Enter your full name"
        required>
        <br><br>
        <label for="fathername">Father Name:</label>
        <input type="text"
        id="fathername"
        name="fathername"
        placeholder="Enter father name"
        required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email"
        id="email"
        name="email"
        placeholder="example@gmail.com"
        required>
        <br><br>
        <label for="password">Password:</label>
        <input type="password"
        id="password"
        name="password"
        placeholder="Enter Password"
        maxlength="10"
        required>
        <br><br>
        <label for="phone">Phone Number:</label>
        <input type="tel"
        id="phone"
        name="phone"
        placeholder="03XX-XXXXXXX"
        required>
        <br><br>
        <label for="cnic">CNIC:</label>
        <input type="text"
        id="cnic"
        name="cnic"
        placeholder="XXXXX-XXXXXXX-X"
        maxlength="15"
        required>
        <br><br>
        <label for="dob">Date of Birth:</label>
        <input type="date"
        id="dob"
        name="dob"
        required>
        <br><br>
        <label for="age">Age:</label>
        <input type="number"
        id="age"
        name="age"
        min="10"
        max="60"
        required>
        <br><br>
        <label>Gender:</label>
        <input type="radio"
        name="gender"
        value="male"
        required> Male
        <input type="radio"
        name="gender"
        value="female"> Female
        <input type="radio"
        name="gender"
        value="other"> Other
        <br><br>
        <label for="city">Select City:</label>
        <select id="city"
        name="city"
        required>
        <option value="">--Select City--</option>
        <option value="lahore">Lahore</option>
        <option value="karachi">Karachi</option>
        <option value="islamabad">Islamabad</option>
        <option value="peshawar">Peshawar</option>
        </select>
        <br><br>
        <label for="adress">Address:</label><br>
        <textarea id="address"
        name="address"
        rows="4"
        cols="30"
        placeholder="Enter your complete address"
        required></textarea>
        <br><br>
        <!-- readonly field -->
         <label for="institute">Institute Name:</label>
         <input type="text"
         id="institute"
         name="institute"
         value="Ficohitech"
         readonly>
         <br><br>
         <!-- disabled field -->
          <label for="discount">Discount Code:</label>
          <input type="text"
          id="discount"
          name="discount"
          value="Not Available"
          disabled>
          <br><br>
          <!-- file upload -->
            <label for="photo">Upload Your Photo:</label>
            <input type="file"
            id="photo"
            name="photo">
            <br><br>
            <!-- website URL -->
             <label for="website">Portfolio Website:</label>
             <input type="url"
             id="website"
             name="website"
             placeholder="https://example.com">
             <br><br>
          <!-- submit button -->
           <button type="submit">Submit Form</button>
           <button type="reset">Clear Form</button>
           <br><br>
     </form>
</body>
</html>
