<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <h1>Contact Form</h1>
    <form>
    <label>
        Name:
        <input type="text"
        required
        minlength="5"
        maxlength="20"
        placeholder="Enter your name">
    </label>
    <br><br>
    <label>
        Email
        <input type="email"
        placeholder="Enter your email">
    </label>
    <br><br>
    <label>
        Password:
        <input type="password">
    </label>
    <br><br>
    <p>Gender</p>
    <lable>
        Female:
        <input type="radio"
        name="gender">
    </lable>
    <lable>
        Male:
        <input type="radio"
        name="gender">
    </lable>
    <br><br>
    <p>Subject</p>
    <lable>
        HTML
        <input type="checkbox">
    </lable>
    <lable>
        CSS
        <input type="checkbox">
    </lable>
    <lable>
        JavaScript
        <input type="checkbox">
    </lable>
    <br><br>
    <lable>
        Select City:
        <select>
            <option hidden>Select City</option>
            <option>lahore</option>
            <option>Multan</option>
            <option>Karachi</option>
        </select>
    </lable>
    <br><br>
    <button type="submit">Send</button>
    <form>
</body>
</html>
